    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATS Dashboard Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }
    
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .login-container{
      width:380px;
      background:#ffffff;
      padding:40px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .login-container h1{
      text-align:center;
      margin-bottom:10px;
      color:#0f172a;
      font-size:32px;
    }

    .login-container p{
      text-align:center;
      color:#64748b;
      margin-bottom:30px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#334155;
      font-weight:bold;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#2563eb;
      box-shadow:0 0 5px rgba(37,99,235,0.4);
    }

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#1d4ed8;
    }

    .footer-text{
      text-align:center;
      margin-top:20px;
      font-size:13px;
      color:#64748b;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>ATS Dashboard Login </h1>
    <p>Login to Company Dashboard</p>

    <form id="loginForm">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Login
      </button>

    </form>

    <div class="footer-text">
      © 2026 TalentOS Dashboard
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      btn.style.opacity = '0.8';

      // Simulate a brief delay for a professional user experience
      setTimeout(() => {
        // Set login state so dashboard.html bypasses its internal login check
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      }, 1000);
    });
  </script>
</body>
</html>
